name: Build and Attach JAR on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Find built JAR
        id: jar
        run: |
          JAR_PATH=$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No JAR file found in target/."
            exit 1
          fi
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload JAR to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
