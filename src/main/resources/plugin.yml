name: EzNightVision
main: com.ezinnovations.eznightvision.EzNightVision
version: 1.0.0
author: EzInnovations

description: Cross-version Night Vision toggle plugin for Bukkit-family servers.

commands:
  nightvision:
    description: Toggle or set Night Vision for yourself or another player.
    usage: /nightvision [on|off] [player]
    aliases: [nv]
  nv:
    description: Alias of /nightvision.
    usage: /nv [on|off] [player]

permissions:
  eznightvision.use:
    description: Allows toggling or setting your own Night Vision state.
    default: true
  eznightvision.others:
    description: Allows enabling or disabling Night Vision for other players.
    default: op
  eznightvision.admin:
    description: Administrative Night Vision control, including other players.
    default: op
    children:
      eznightvision.others: true
